<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oakhouse Ministry Plan — Live</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', system-ui, sans-serif;
    background: #d8d4cb;
    min-height: 100vh;
    /* leave room for the fixed Live Bar */
    padding-bottom: 80px;
  }
  .mp-stage {
    width: 880px;
    max-width: 100%;
    margin: 36px auto 60px;
    background: white;
    box-shadow: 0 18px 60px rgba(29, 39, 51, 0.18), 0 4px 14px rgba(29, 39, 51, 0.08);
    overflow: hidden;
  }
  @media print {
    body { background: white; padding-bottom: 0; }
    .mp-stage { margin: 0; width: 100%; box-shadow: none; }
    .mp-stage > * { width: 100% !important; }
  }
</style>
</head>
<body>

<!-- =============================================================
     LIVE-PAGE CONFIG — fill in after Apps Script deploy.
     See SETUP.md for the step-by-step.

     EMBEDDING ON SQUARESPACE (or anywhere):
       Each embed becomes its own plan via the ?plan= URL parameter.
       e.g.  <iframe src="…/Ministry Plan - Live.html?plan=worship-ministry"></iframe>
             <iframe src="…/Ministry Plan - Live.html?plan=kids-ministry"></iframe>
       Same ?plan= value across pages/browsers → same plan (autosaved to Sheets).
       Different ?plan= values → fully independent plans.
     ============================================================= -->
<script>
  // The /exec URL from your Apps Script Web App deployment.
  window.MP_BACKEND_URL = "https://script.google.com/macros/s/AKfycbxg78iB03WUOAbiMV1moRBV1vgKCNACRNtGv3SbwVhLqX_wK9Ac58pgfYuSUlNwT4gd/exec";

  // Used when no ?plan= URL parameter is provided.
  window.MP_DEFAULT_PLAN = "default";

  // The fiscal year this page is for. Each plan_key holds ONE row per year.
  // If your existing data was saved under a different year, set it to match (e.g. "25-26").
  window.MP_YEAR = "25-26";

  // Optional: if you set WRITE_SECRET in the Apps Script Script Properties,
  // put the same value here so this page can read/write. Leave blank to skip.
  window.MP_WRITE_SECRET = "";

  // Optional: link to the shared Sheet for the "All Plans →" button.
  window.MP_DASHBOARD_URL = "";
</script>

<div id="root" class="mp-stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="mp-content.js"></script>
<script type="text/babel" src="v3-contrast.jsx"></script>
<script type="text/babel" src="mp-live.jsx"></script>

<!-- Mount the form, then mount the live overlay on top of it. -->
<script type="text/babel">
  setTimeout(() => {
    const App = window.MPContrast;
    const Live = window.MPLive;

    // Render the form
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // Render the live overlay (submitter block + bottom bar) into a
    // separate root that floats above the form.
    const liveHost = document.createElement('div');
    liveHost.id = 'mp-live-root';
    document.body.appendChild(liveHost);
    ReactDOM.createRoot(liveHost).render(<Live />);
  }, 60);
</script>

</body>
</html>
